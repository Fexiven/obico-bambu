services:
  bambu-obico:
    build: .
    container_name: bambu-obico
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - BAMBU_HOST=YOUR_PRINTER_IP
      - BAMBU_CODE=YOUR_ACCESS_CODE
      - BAMBU_SERIAL=YOUR_SERIAL
      - DETECTION_THRESHOLD=0.20
      - JPEG_QUALITY=85