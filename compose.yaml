services:
  bambu-obico:
    build: .
    container_name: bambu-obico
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - BAMBU_HOST=<printer-ip>
      - BAMBU_CODE=<lan-access-code>
      - BAMBU_SERIAL=<serial-number>
      - MQTT_HOST=<mqtt-broker>
      - DETECTION_THRESHOLD=0.20
      - ALERT_THRESHOLD=0.3
      - JPEG_QUALITY=85